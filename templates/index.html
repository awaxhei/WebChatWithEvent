<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 情感助手</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- 登录遮罩 -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <svg class="login-lock" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="loginPassword" placeholder="密码" autofocus autocomplete="off">
            <label class="remember-label">
                <input type="checkbox" id="rememberPwd">
                <span>记住</span>
            </label>
            <button id="btnLogin">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                </svg>
            </button>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <!-- 移动端顶部导航 -->
    <header class="mobile-header" id="mobileHeader">
        <button class="nav-btn" data-panel="history" title="历史">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
        </button>
    </header>

    <!-- 主体布局 -->
    <div class="app-container" id="appContainer">

        <!-- 左侧：历史记录面板 -->
        <aside class="sidebar history-panel" id="historyPanel">
            <div class="panel-header">
                <button class="btn-icon" id="btnNewChat" title="新对话">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
            </div>
            <ul class="history-list" id="historyList"></ul>
        </aside>

        <!-- 中间：聊天主区域 -->
        <main class="chat-main">
            <!-- 角色名标题 -->
            <div class="char-title" id="charTitle">
                <span class="char-name">尤夏</span>
                <span class="location-tag" id="locationTag">公寓客厅</span>
            </div>
            <!-- AI B: 环境叙述滚动时间轴 -->
            <div class="narration-bar" id="narrationBar">
                <div class="narration-track" id="narrationTrack"></div>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <svg class="welcome-icon" viewBox="0 0 64 64" width="56" height="56" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round">
                        <path d="M32 8C19 8 8 17 8 28c0 10 8 17 16 19v9l10-8c12 0 22-9 22-20S45 8 32 8z"/>
                        <circle cx="22" cy="28" r="2.5" fill="#6366f1"/>
                        <circle cx="42" cy="28" r="2.5" fill="#6366f1"/>
                    </svg>
                </div>
            </div>
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <textarea
                        id="messageInput"
                        placeholder="Message..."
                        rows="1"
                        autofocus
                    ></textarea>
                    <button class="btn-send" id="btnSend" title="发送">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>

    </div>

    <!-- 事件面板（桌面端右侧 / 移动端可切换） -->
    <aside class="event-panel" id="eventPanel">
        <div class="event-panel-header">
            <span class="event-panel-title">故事进展</span>
            <button class="btn-icon btn-event-close" id="btnEventClose" title="关闭">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="event-story-time" id="eventStoryTime">
            <span class="time-icon"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><polyline points="8 5 8 8 10.5 10.5"/></svg></span>
            <span class="time-text">第一天早晨</span>
        </div>
        <div class="event-summary" id="eventSummary"></div>
        <div class="event-list" id="eventList">
            <div class="event-empty">暂无事件记录，开始对话吧～</div>
        </div>
        <div class="event-push-hint" id="eventPushHint" style="display:none;">
            <div class="push-hint-bar">
                <span class="push-icon"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="1.5" fill="currentColor"/><path d="M8 3V1m0 14v-2M1 8h2m10 0h2M3.05 3.05l1.41 1.41m7.08 7.08l1.41 1.41M3.05 12.95l1.41-1.41m7.08-7.08l1.41-1.41"/></svg></span>
                <span class="push-text" id="pushHintText"></span>
            </div>
        </div>
    </aside>

    <!-- 移动端遮罩 -->
    <div class="overlay" id="overlay"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
